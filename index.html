    <!-- Офлайн индикатор -->
    <div class="offline-indicator" id="offline-indicator">
        <i class="fas fa-wifi-slash"></i>
        <span>You're offline. Messages will send when connection returns.</span>
    </div>
    
    <!-- Утилиты -->
    <script>
        // ========== УТИЛИТЫ ==========
        class HypebitUtils {
            static showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = 'notification';
                
                let icon = 'fa-info-circle';
                let color = '#3B82F6';
                
                switch(type) {
                    case 'success':
                        icon = 'fa-check-circle';
                        color = '#10B981';
                        break;
                    case 'error':
                        icon = 'fa-exclamation-circle';
                        color = '#EF4444';
                        break;
                    case 'points':
                        icon = 'fa-star';
                        color = '#F59E0B';
                        break;
                    case 'call':
                        icon = 'fa-phone';
                        color = '#10B981';
                        break;
                    case 'upload':
                        icon = 'fa-upload';
                        color = '#3B82F6';
                        break;
                }
                
                notification.innerHTML = `
                    <i class="fas ${icon}" style="color: ${color}"></i>
                    ${message}
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideIn 0.3s reverse';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
            
            static formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
            }
            
            static getTimeAgo(timestamp) {
                const now = new Date();
                const diff = now - timestamp;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                
                if (minutes < 1) return 'Just now';
                if (minutes < 60) return `${minutes}m ago`;
                if (hours < 24) return `${hours}h ago`;
                if (days < 7) return `${days}d ago`;
                return timestamp.toLocaleDateString();
            }
            
            static debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }

            static throttle(func, limit) {
                let inThrottle;
                return function(...args) {
                    if (!inThrottle) {
                        func.apply(this, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                };
            }

            static isMobile() {
                return window.innerWidth <= 768;
            }

            static isOnline() {
                return navigator.onLine;
            }
        }

        // ========== МОНИТОРИНГ СОЕДИНЕНИЯ ==========
        window.addEventListener('online', () => {
            document.getElementById('offline-indicator').classList.remove('active');
            HypebitUtils.showNotification('Connection restored!', 'success');
            
            // Refresh data when connection returns
            if (window.app && window.app.currentUser) {
                window.app.loadChats();
            }
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-indicator').classList.add('active');
        });

        // ========== ОБРАБОТКА ОШИБОК ==========
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled error:', event.reason);
            
            // Don't show notification for offline errors
            if (event.reason?.message?.includes('offline') || 
                event.reason?.message?.includes('network')) {
                return;
            }
            
            HypebitUtils.showNotification('Something went wrong. Please try again.', 'error');
        });

        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
        });

        // ========== DEBOUNCED ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
        const debouncedUserSearch = HypebitUtils.debounce((query) => {
            if (window.app) {
                window.app.searchAllUsers(query);
            }
        }, 300);

        // Setup search input
        const searchInput = document.getElementById('user-search-input');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                debouncedUserSearch(e.target.value);
            });
            
            // Clear search on Escape
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    document.getElementById('search-sidebar')?.classList.remove('active');
                }
            });
        }

        // ========== КЛАВИАТУРНЫЕ СОКРАЩЕНИЯ ==========
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts when typing in input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            // Ctrl+K for search focus
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('user-search-input')?.focus();
            }
            
            // Escape to close modals and search
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
                document.getElementById('search-sidebar')?.classList.remove('active');
                
                // End active call
                if (window.app && window.app.isCallActive) {
                    window.app.endCall();
                }
            }
            
            // Ctrl+N for new chat
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                if (window.app) {
                    window.app.openModal('new-chat-modal');
                }
            }
            
            // Ctrl+G for new group
            if (e.ctrlKey && e.key === 'g') {
                e.preventDefault();
                if (window.app) {
                    window.app.openModal('new-group-modal');
                }
            }
            
            // Ctrl+H for new channel
            if (e.ctrlKey && e.key === 'h') {
                e.preventDefault();
                if (window.app) {
                    window.app.openModal('new-channel-modal');
                }
            }
            
            // Ctrl+M to toggle mute during call
            if (e.ctrlKey && e.key === 'm' && window.app && window.app.isCallActive) {
                e.preventDefault();
                window.app.toggleMute();
            }
        });

        // ========== ТУТОРИАЛЫ ДЛЯ НОВЫХ ПОЛЬЗОВАТЕЛЕЙ ==========
        const showWelcomeTutorial = () => {
            const hasSeenTutorial = localStorage.getItem('hypebit_tutorial');
            if (hasSeenTutorial) return;
            
            setTimeout(() => {
                HypebitUtils.showNotification('👋 Welcome to HYPEBIT! Use Ctrl+K to search users.', 'info');
                localStorage.setItem('hypebit_tutorial', 'true');
            }, 2000);
        };
        
        const showPointsTutorial = () => {
            const hasSeenPoints = localStorage.getItem('hypebit_points_tutorial');
            if (hasSeenPoints) return;
            
            setTimeout(() => {
                HypebitUtils.showNotification('⭐ You earn 1 point for every 120 messages! Check the shop.', 'points');
                localStorage.setItem('hypebit_points_tutorial', 'true');
            }, 5000);
        };
        
        const showSearchTutorial = () => {
            const hasSeenSearch = localStorage.getItem('hypebit_search_tutorial');
            if (hasSeenSearch) return;
            
            setTimeout(() => {
                HypebitUtils.showNotification('🔍 Try searching for users by name in the search bar!', 'info');
                localStorage.setItem('hypebit_search_tutorial', 'true');
            }, 8000);
        };
        
        const showCallTutorial = () => {
            const hasSeenCall = localStorage.getItem('hypebit_call_tutorial');
            if (hasSeenCall) return;
            
            setTimeout(() => {
                HypebitUtils.showNotification('📞 Click the green phone button to call other users!', 'call');
                localStorage.setItem('hypebit_call_tutorial', 'true');
            }, 15000);
        };
        
        const showFileTutorial = () => {
            const hasSeenFile = localStorage.getItem('hypebit_file_tutorial');
            if (hasSeenFile) return;
            
            setTimeout(() => {
                HypebitUtils.showNotification('📎 You can share images and files up to 10MB!', 'upload');
                localStorage.setItem('hypebit_file_tutorial', 'true');
            }, 20000);
        };
        
        // Run tutorials if user is logged in
        setTimeout(() => {
            if (window.app && window.app.currentUser) {
                showWelcomeTutorial();
                showPointsTutorial();
                showSearchTutorial();
                showCallTutorial();
                showFileTutorial();
            }
        }, 3000);

        // ========== МОБИЛЬНАЯ НАВИГАЦИЯ ==========
        // Add swipe to open/close sidebar on mobile
        if (HypebitUtils.isMobile()) {
            let touchStartX = 0;
            let touchEndX = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            document.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const swipeDistance = touchEndX - touchStartX;
                const sidebar = document.querySelector('.sidebar');
                
                // Swipe right to open sidebar (from left edge)
                if (swipeDistance > 100 && touchStartX < 50) {
                    sidebar?.classList.add('active');
                }
                
                // Swipe left to close sidebar
                if (swipeDistance < -100 && touchEndX < 50) {
                    sidebar?.classList.remove('active');
                }
            }
        }

        // ========== ФИНАЛЬНАЯ ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', () => {
            console.log('%c🚀 HYPEBIT Messenger v4.0', 'color: #3B82F6; font-size: 20px; font-weight: bold');
            console.log('%c✨ Features:', 'color: #10B981; font-size: 14px');
            console.log('  • Private chats with encryption');
            console.log('  • Groups & Channels');
            console.log('  • Official chat for all users');
            console.log('  • Profile customization');
            console.log('  • Points system (1 point / 120 messages)');
            console.log('  • Shop with colors, reactions, themes');
            console.log('  • Search users (real-time)');
            console.log('  • Audio calls with WebRTC');

            console.log('  • Mobile optimized with swipe gestures');
            console.log('  • Offline support');
            console.log('  • Keyboard shortcuts (Ctrl+K, Ctrl+N, Ctrl+G, Ctrl+H, Ctrl+M)');
            
            console.log('%c📊 Statistics:', 'color: #F59E0B; font-size: 14px');
            console.log(`  • Total lines: ~5000+`);
            console.log('  • Firebase connected');
            console.log('  • WebRTC ready');
            
            // Add footer with version
            const footer = document.createElement('div');
            footer.style.cssText = `
                position: fixed;
                bottom: 10px;
                right: 10px;
                color: rgba(255,255,255,0.2);
                font-size: 11px;
                z-index: 999;
                pointer-events: none;
            `;
            footer.innerHTML = `HYPEBIT v4.0 © ${new Date().getFullYear()}`;
            document.body.appendChild(footer);
        });

        // ========== ПРЕДОТВРАЩАЕМ СЛУЧАЙНЫЙ ВЫХОД ==========
        window.onbeforeunload = (e) => {
            const input = document.getElementById('message-input');
            if (input && input.value.trim()) {
                e.preventDefault();
                e.returnValue = 'You have unsaved message. Are you sure you want to leave?';
            }
            
            // Warning for active call
            if (window.app && window.app.isCallActive) {
                e.preventDefault();
                e.returnValue = 'You are in a call. Are you sure you want to leave?';
            }
        };

        // ========== ЭКСПОРТ УТИЛИТ ==========
        window.HypebitUtils = HypebitUtils;
    </script>
