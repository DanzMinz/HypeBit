<!-- ========== 1.3 ОСНОВНЫЕ СТИЛИ ========== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0B1120;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        /* Темы оформления */
        body.theme-dark {
            background: #0B1120;
        }
        body.theme-dark::before {
            opacity: 0.15;
        }
        body.theme-forest {
            background: #1A2F1A;
        }
        body.theme-forest::before {
            opacity: 0.2;
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920') center/cover;
        }
        body.theme-space {
            background: #0B0B1A;
        }
        body.theme-space::before {
            opacity: 0.3;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1920') center/cover;
        }
        body.theme-light {
            background: #E5E7EB;
        }
        body.theme-light::before {
            opacity: 0.1;
        }
        body.theme-mountain {
            background: #0B1120;
        }
        body.theme-mountain::before {
            opacity: 0.2;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1920') center/cover;
        }

        /* Цвета имён */
        .username-color-blue { color: #3B82F6 !important; }
        .username-color-red { color: #EF4444 !important; }
        .username-color-green { color: #10B981 !important; }
        .username-color-purple { color: #8B5CF6 !important; }
        .username-color-gold { color: #F59E0B !important; }
        .username-color-pink { color: #EC4899 !important; }

<!-- ========== 1.4 ЭКРАН ЗАГРУЗКИ ========== -->
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0B1120;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #1E2A47;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            color: white;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

<!-- ========== 1.5 АВТОРИЗАЦИЯ ========== -->
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(11, 17, 32, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .auth-container.active {
            display: flex;
        }

        .auth-card {
            background: rgba(30, 42, 71, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: white;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #3B82F6;
        }

        .auth-header p {
            color: #9CA3AF;
            font-size: 16px;
        }

        .auth-form {
            display: none;
            width: 100%;
        }

        .auth-form.active {
            display: block;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #3B82F6;
            font-size: 18px;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(11, 17, 32, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .input-group input::placeholder {
            color: #6B7280;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .auth-btn:disabled {
            background: #4B5563;
            cursor: not-allowed;
            transform: none;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #9CA3AF;
            font-size: 14px;
        }

        .auth-switch a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

<!-- ========== 1.6 ОСНОВНОЙ ИНТЕРФЕЙС ========== -->
        .app-container {
            display: none;
            width: 100%;
            height: 100vh;
            grid-template-columns: 300px 1fr;
            background: transparent;
        }

        .app-container.active {
            display: grid;
        }

<!-- ========== 1.7 САЙДБАР ========== -->
        .sidebar {
            background: rgba(11, 17, 32, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .user-profile {
            padding: 15px;
            background: rgba(30, 42, 71, 0.5);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #3B82F6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .username {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            color: #10B981;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            display: inline-block;
        }

        .points-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 6px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }

        .points-badge i {
            font-size: 9px;
        }

        .profile-actions {
            display: flex;
            gap: 5px;
        }

        .profile-actions button {
            background: transparent;
            border: none;
            color: #9CA3AF;
            font-size: 16px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-actions button:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
        }

        .search-container {
            padding: 12px 15px;
            position: relative;
        }

        .search-container i {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #6B7280;
            font-size: 14px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(30, 42, 71, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #3B82F6;
            background: rgba(30, 42, 71, 0.95);
        }

<!-- ========== 1.8 СПИСОК ЧАТОВ ========== -->
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chats-list::-webkit-scrollbar {
            width: 4px;
        }

        .chats-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .chats-list::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 2px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .chat-item.active {
            background: rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3B82F6;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            background: linear-gradient(135deg, #1E2A47, #2A3A5F);
            flex-shrink: 0;
        }

        .chat-avatar.official {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
        }

        .chat-avatar.group {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
        }

        .chat-avatar.channel {
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
        }

        .chat-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #10B981;
            border-radius: 50%;
            border: 2px solid #1E2A47;
            z-index: 2;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-badge {
            display: inline-block;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            margin-left: 4px;
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
        }

        .chat-badge.official {
            background: rgba(139, 92, 246, 0.2);
            color: #8B5CF6;
        }

        .chat-badge.group {
            background: rgba(139, 92, 246, 0.2);
            color: #8B5CF6;
        }

        .chat-badge.channel {
            background: rgba(236, 72, 153, 0.2);
            color: #EC4899;
        }

        .chat-last-message {
            color: #9CA3AF;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            color: #6B7280;
            font-size: 10px;
            white-space: nowrap;
            margin-left: auto;
        }

<!-- ========== 1.9 ОБЛАСТЬ ЧАТА ========== -->
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(11, 17, 32, 0.85);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            background: rgba(30, 42, 71, 0.5);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header .chat-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .chat-avatar {
            width: 45px;
            height: 45px;
        }

        .chat-details .chat-name {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .chat-details .chat-name i {
            font-size: 12px;
            margin-left: 6px;
            color: #9CA3AF;
            cursor: pointer;
        }

        .chat-status {
            color: #10B981;
            font-size: 12px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-actions button {
            background: transparent;
            border: none;
            color: #9CA3AF;
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-actions button:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
        }

        .attach-btn {
            display: none;
        }

<!-- ========== 1.10 СООБЩЕНИЯ ========== -->
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 2px;
        }

        .welcome-message {
            text-align: center;
            color: #9CA3AF;
            margin: auto;
            padding: 20px;
        }

        .welcome-message i {
            font-size: 48px;
            color: #3B82F6;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            max-width: 70%;
            animation: fadeIn 0.2s ease;
        }

        .message.outgoing {
            margin-left: auto;
        }

        .message.incoming {
            margin-right: auto;
        }

        .message-content {
            padding: 10px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .message.outgoing .message-content {
            background: #3B82F6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.incoming .message-content {
            background: rgba(30, 42, 71, 0.9);
            color: white;
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #8B5CF6;
            display: block;
            letter-spacing: 0.3px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .message-status {
            display: inline-flex;
            align-items: center;
            font-size: 9px;
        }

        .message-status.sent { color: rgba(255, 255, 255, 0.3); }
        .message-status.delivered { color: rgba(255, 255, 255, 0.5); }
        .message-status.read { color: #3B82F6; }

        .message-reactions {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .reaction {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 11px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reaction:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: scale(1.05);
        }

        .reaction.premium {
            background: linear-gradient(135deg, #F59E0B, #EC4899);
            border: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 10px;
            margin: 5px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-message:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .file-message i {
            font-size: 24px;
            color: #3B82F6;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            color: white;
            font-size: 13px;
            margin-bottom: 2px;
            word-break: break-word;
        }

        .file-size {
            color: #9CA3AF;
            font-size: 11px;
        }

<!-- ========== 1.11 ВВОД СООБЩЕНИЙ ========== -->
        .message-input-area {
            padding: 12px 15px;
            background: rgba(30, 42, 71, 0.5);
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .emoji-btn {
            background: transparent;
            border: none;
            color: #9CA3AF;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .emoji-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(11, 17, 32, 0.8);
            border-radius: 20px;
            padding: 5px 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .input-wrapper textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 0;
            max-height: 80px;
            resize: none;
            outline: none;
        }

        .send-btn {
            background: #3B82F6;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {

            <!-- ========== 2.3 ИНИЦИАЛИЗАЦИЯ ========== --!>
            init() {
                console.log('🔥 HYPEBIT initializing...');
                
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        console.log('✅ User logged in:', user.uid);
                        this.currentUser = user;
                        
                        await this.loadUserData(user);
                        this.loadChats();
                        this.updateUserStatus('online');
                        this.ensureOfficialChat();
                        
                        this.showApp();
                    } else {
                        console.log('🟡 No user, showing login form');
                        this.showAuth();
                        this.cleanupListeners();
                    }
                });

                this.setupEventListeners();
            }

            setupEventListeners() {

                document.getElementById('show-register')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.toggleAuthForms('register');

                document.getElementById('show-login')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.toggleAuthForms('login');
                });
                document.getElementById('login-form')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });
                document.getElementById('register-form')?.addEventListener('submit', (e) => {

                });
                document.getElementById('add-member-btn')?.addEventListener('click', () => {

                });

                document.getElementById('send-btn')?.addEventListener('click', () => {
                    this.sendMessage();
                });

                });

            toggleAuthForms(form) {
                const loginForm = document.getElementById('login-form');
                const registerForm = document.getElementById('register-form');
                if (form === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                } else {
                    loginForm.classList.remove('active');
                    registerForm.classList.add('active');
                }
            }

            <!-- ========== 2.4 АВТОРИЗАЦИЯ ========== -->
            async register() {
                const username = document.getElementById('register-username').value;
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                const confirm = document.getElementById('register-confirm').value;

                if (password !== confirm) {
                    alert('Passwords do not match!');
                    return;
                }
                if (password.length < 6) {
                    alert('Password must be at least 6 characters!');
                    return;
                }

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    await user.updateProfile({ displayName: username });

                    await db.collection('users').doc(user.uid).set({
                        username: username,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        status: 'online',
                        avatar: `https://ui-avatars.com/api/?name=${username.charAt(0)}&background=1E2A47&color=3B82F6&size=200`,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                        bio: '',
                        points: 0,
                        messagesCount: 0,
                        purchasedItems: [],
                        usernameColor: '',
                        theme: 'dark'
                    });

                    alert('Registration successful!');
                    
                } catch (error) {
                    alert(this.getErrorMessage(error.code));
                }
            }

            async login() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (error) {
                    alert(this.getErrorMessage(error.code));
                }
            }

            async logout() {
                try {
                    if (this.currentUser) {
                        await db.collection('users').doc(this.currentUser.uid).update({
                            status: 'offline',
                            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    this.cleanupListeners();
                    await auth.signOut();
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }

            async updateUserStatus(status) {
                if (!this.currentUser) return;
                await db.collection('users').doc(this.currentUser.uid).update({
                    status: status,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            cleanupListeners() {
                if (this.chatsListener) this.chatsListener();
                if (this.messagesListener) this.messagesListener();
                this.chatsListener = this.messagesListener = null;
            }

            showApp() {
                document.getElementById('auth-container')?.classList.remove('active');
                document.getElementById('app-container')?.classList.add('active');
                document.getElementById('loading-screen')?.classList.add('hidden');
                console.log('✅ Showing app');
            }

            showAuth() {
                document.getElementById('auth-container')?.classList.add('active');
                document.getElementById('app-container')?.classList.remove('active');
                document.getElementById('loading-screen')?.classList.add('hidden');
                console.log('🟡 Showing auth');
            }

            <!-- ========== 2.5 ЗАГРУЗКА ДАННЫХ (ИСПРАВЛЕНО) ========== -->
async loadUserData(user) {
    try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        this.userData = userDoc.data();
        
        if (!this.userData) {
            await db.collection('users').doc(user.uid).set({
                username: user.displayName || 'User',
                email: user.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),

                lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                bio: '',
                points: 0,
                messagesCount: 0,
                purchasedItems: [],
                usernameColor: '',
                theme: 'dark'
            });
            this.userData = {
                username: user.displayName || 'User',
                avatar: `https://ui-avatars.com/api/?name=${(user.displayName || 'U').charAt(0)}&background=1E2A47&color=3B82F6&size=200`,
                points: 0,
                messagesCount: 0,
                purchasedItems: [],
                usernameColor: '',
                theme: 'dark'
            };
        }
        
        this.userPoints = this.userData.points || 0;
        this.userMessages = this.userData.messagesCount || 0;
        
        if (this.userData.purchasedItems) {
            this.userData.purchasedItems.forEach(item => this.purchasedItems.add(item));
        }
        
        if (this.userData.theme) {
            document.body.className = `theme-${this.userData.theme}`;

        // ===== ВАЖНО: проверяем существование элементов перед обновлением =====
        const usernameEl = document.getElementById('username');
        if (usernameEl) {
            usernameEl.textContent = this.userData.username || user.displayName;
            if (this.userData.usernameColor) {
                usernameEl.className = `username username-color-${this.userData.usernameColor}`;
            }
        } else {
            console.warn('⚠️ Username element not found');

            `;

}
            <!-- ========== 2.6 ЗАГРУЗКА ЧАТОВ (С ИСПРАВЛЕННЫМИ АВАТАРКАМИ) ========== -->
            loadChats() {
                const chatsList = document.getElementById('chats-list');
                if (!chatsList) return;
                
                chatsList.innerHTML = '<div style="color: #9CA3AF; text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Loading chats...</div>';
                
                if (!this.currentUser) {
                    chatsList.innerHTML = '<div style="color: #EF4444; text-align: center; padding: 20px;">Please log in first</div>';
                    return;
                }
                
                try {
                    this.chatsListener = db.collection('chats')
                        .where('participants', 'array-contains', this.currentUser.uid)
                        .orderBy('lastMessageTime', 'desc')
                        .onSnapshot((snapshot) => {
                            if (snapshot.empty) {
                                chatsList.innerHTML = `
                                    <div style="color: #9CA3AF; text-align: center; padding: 20px;">
                                        <i class="fas fa-comments" style="font-size: 48px; opacity: 0.5; margin-bottom: 10px;"></i>
                                        <p>No chats yet</p>
                                        <p style="font-size: 12px;">Click "New Chat" to start</p>
                                    </div>
                                `;
                                return;
                            }

                            chatsList.innerHTML = '';
                            const processedIds = new Set();
                            
                            snapshot.forEach(doc => {
                                if (processedIds.has(doc.id)) return;
                                processedIds.add(doc.id);
                                
                                const chat = doc.data();
                                const type = chat.type || 'private';
                                
                                if (type === 'private') {
                                    const otherUserId = chat.participants?.find(id => id !== this.currentUser.uid);
                                    if (otherUserId) {
                                        this.getUserData(otherUserId).then(userData => {
                                            this.renderSingleChat(doc.id, chat, type, userData);
                                        });
                                    }
                                } else {
                                    this.renderSingleChat(doc.id, chat, type);
                                }
                            });
                        }, (error) => {
                            console.error('Error loading chats:', error);
                            chatsList.innerHTML = `<div style="color: #EF4444; text-align: center; padding: 20px;">Failed to load chats</div>`;
                        });
                } catch (error) {
                    console.error('Error setting up chats listener:', error);
                    chatsList.innerHTML = `<div style="color: #EF4444; text-align: center; padding: 20px;">Failed to load chats</div>`;
                }
            }

            // ========== ОТРИСОВКА ЧАТА (ИСПРАВЛЕННЫЕ АВАТАРКИ) ==========
            renderSingleChat(id, chat, type, userData = null) {
                if (document.getElementById(`chat-${id}`)) return;
                
                let name = '';
                let lastMessage = chat.lastMessage ? 
                    (chat.lastMessage.senderId === this.currentUser.uid ? 'You: ' : '') + 
                    (chat.lastMessage.text || '📎 File') : 'No messages';
                let time = chat.lastMessageTime ? this.formatTime(chat.lastMessageTime.toDate()) : '';
                let badge = type === 'official' ? 'official' : type;
                
                // ===== ИСПРАВЛЕННЫЕ АВАТАРКИ =====
                let avatarContent = '';
                
                if (type === 'official') {
                    avatarContent = '⭐'; // Официальный чат — звезда
                } else if (type === 'group') {
                    avatarContent = '👥'; // Группа — человечки
                } else if (type === 'channel') {
                    avatarContent = '📢'; // Канал — рупор
                } else if (type === 'private' && userData) {
                    // Личный чат — первая буква имени
                    avatarContent = userData.username.charAt(0).toUpperCase();
                } else {
                    avatarContent = '👤'; // Заглушка
                }
                
                if (type === 'private' && userData) {
                    name = userData.username;
                } else if (type === 'official') {
                    name = 'HYPEBIT Official';
                } else if (type === 'group') {
                    name = chat.name || 'Group';
                } else if (type === 'channel') {
                    name = chat.name || 'Channel';
                }
                
                if (lastMessage.length > 40) lastMessage = lastMessage.substring(0, 40) + '...';
                
                const html = `
                    <div class="chat-item" id="chat-${id}" onclick="app.selectChat('${id}', '${type}')">
                        <div class="chat-avatar ${type}">${avatarContent}</div>
                        <div class="chat-info">
                            <div class="chat-name">${name} <span class="chat-badge ${badge}">${badge}</span></div>
                            <div class="chat-last-message"><span>${lastMessage}</span></div>
                        </div>
                        <div class="chat-time">${time}</div>
                    </div>
                `;
                
                document.getElementById('chats-list').insertAdjacentHTML('beforeend', html);
            }

            async getUserData(userId) {
                if (this.allUsers.has(userId)) return this.allUsers.get(userId);
                try {
                    const userDoc = await db.collection('users').doc(userId).get();
                    const userData = userDoc.data();
                    if (userData) this.allUsers.set(userId, userData);
                    return userData;
                } catch (error) {
                    console.error('Error getting user data:', error);
                    return null;
                }
            }

            formatTime(date) {
                const now = new Date();
                const diff = now - date;
                const day = 24 * 60 * 60 * 1000;
                
                if (diff < day) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (diff < 7 * day) return date.toLocaleDateString([], { weekday: 'short' });
                return date.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
            }

            <!-- ========== 2.7 ВЫБОР ЧАТА (ИСПРАВЛЕНО) ========== -->
            async selectChat(chatId, type) {
                console.log('🔄 Switching to chat:', chatId, type);
                
                // ВАЖНО: сначала отписываемся от старого чата
                if (this.messagesListener) {
                    this.messagesListener();
                    this.messagesListener = null;
                }
                
                // Очищаем контейнер сообщений
                const container = document.getElementById('messages-container');
                if (container) {
                    container.innerHTML = '<div class="loading-spinner"></div>';
                }
                
                this.currentChatId = chatId;
                this.currentChatType = type;
                
                document.querySelectorAll('.chat-item').forEach(el => el?.classList.remove('active'));
                document.getElementById(`chat-${chatId}`)?.classList.add('active');
                
                const chatHeader = document.getElementById('chat-header');
                if (chatHeader) chatHeader.style.display = 'flex';
                
                const messageArea = document.getElementById('message-input-area');
                if (messageArea) {
                    // Для каналов: если админ или restricted=false, то можно писать
                    let canWrite = true;
                    if (type === 'channel' && this.currentChatData) {
                        const isAdmin = this.currentChatData.admins?.includes(this.currentUser.uid);
                        const isRestricted = this.currentChatData.restricted === true;
                        canWrite = !isRestricted || isAdmin;
                    }
                    messageArea.style.display = (type === 'channel' && !canWrite) ? 'none' : 'flex';
                }

                const attachBtn = document.getElementById('attach-btn');
                if (attachBtn) {
                    attachBtn.style.display = (type === 'channel') ? 'none' : 'inline-flex';
                }
                
                try {
                    const chatDoc = await db.collection('chats').doc(chatId).get();
                    if (!chatDoc.exists) {
                        alert('Chat not found');
                        return;
                    }
                    
                    this.currentChatData = chatDoc.data();
                    this.currentChatParticipants = this.currentChatData.participants || [];
                    
                    const chatNameEl = document.getElementById('current-chat-name');
                    const chatStatusEl = document.getElementById('chat-status');
                    
                    if (type === 'private') {
                        const otherUserId = this.currentChatParticipants.find(id => id !== this.currentUser.uid);
                        const userData = await this.getUserData(otherUserId);
                        if (chatNameEl && userData) chatNameEl.innerHTML = userData.username + `<span class="chat-badge private">private</span>`;
                        if (otherUserId) {
                            db.collection('users').doc(otherUserId).onSnapshot((doc) => {
                                const userData = doc.data();
                                if (userData && chatStatusEl) chatStatusEl.textContent = userData.status === 'online' ? 'Online' : 'Offline';
                            });
                        }
                    } else if (type === 'official') {
                        if (chatNameEl) chatNameEl.innerHTML = 'HYPEBIT Official <span class="chat-badge official">official</span>';
                        if (chatStatusEl) chatStatusEl.textContent = 'Everyone is here';
                    } else if (type === 'group') {
                        if (chatNameEl) chatNameEl.innerHTML = (this.currentChatData.name || 'Group') + `<span class="chat-badge group">group</span>`;
                        if (chatStatusEl) chatStatusEl.textContent = `${this.currentChatData.members?.length || 0} members`;
                    } else if (type === 'channel') {
                        if (chatNameEl) chatNameEl.innerHTML = (this.currentChatData.name || 'Channel') + `<span class="chat-badge channel">channel</span>`;
                        
                        // Показываем статус канала
                        const isAdmin = this.currentChatData.admins?.includes(this.currentUser.uid);
                        const subscriberCount = this.currentChatData.subscribers?.length || 0;
                        const restricted = this.currentChatData.restricted ? '🔒 Restricted' : '📢 Public';
                        if (chatStatusEl) {
                            chatStatusEl.textContent = `${subscriberCount} subscribers • ${restricted} ${isAdmin ? '• 👑 Admin' : ''}`;
                        }
                    }
                    
                    // Загружаем сообщения нового чата
                    this.loadMessages(chatId);
                    
                } catch (error) {
                    console.error('Error in selectChat:', error);
                    alert('Error loading chat: ' + error.message);
                }
            }

            <!-- ========== 2.8 ЗАГРУЗКА СООБЩЕНИЙ ========== -->
            loadMessages(chatId) {
                console.log('📂 loadMessages for:', chatId);
                
                if (this.messagesListener) {
                    this.messagesListener();
                    this.messagesListener = null;
                }
                
                const container = document.getElementById('messages-container');
                if (!container) return;
                
                container.innerHTML = '<div class="loading-spinner"></div>';
                
                this.messagesListener = db.collection('chats').doc(chatId)
                    .collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot((snapshot) => {
                        if (snapshot.empty) {
                            container.innerHTML = '<div class="empty-chat">No messages yet</div>';
                            return;
                        }

                        container.innerHTML = '';

                        snapshot.forEach(doc => {
                            const msg = doc.data();
                            
                            // ===== УЛУЧШЕННАЯ РАСШИФРОВКА =====
                            let text = msg.text;
                            if (msg.encrypted) {
                                try {
                                    console.log('🔐 Decrypting message from:', msg.senderId);
                                    const decrypted = hypebitCrypto.decryptMessage(
                                        msg.text, 
                                        chatId, 
                                        msg.senderId
                                    );
                                    
                                    if (decrypted && decrypted !== msg.text && decrypted.trim() !== '') {
                                        text = decrypted;
                                        console.log('✅ Decrypted:', decrypted.substring(0, 20));
                                    } else {
                                        console.warn('⚠️ Empty decryption, using fallback');
                                        text = '💬 New message';
                                    }
                                } catch (error) {
                                    console.error('❌ Decryption error:', error);
                                    text = '💬 Message (encrypted)';
                                }
                            } else {
                                text = msg.text || '💬 Empty message';
                            }

                            // Если всё равно пусто
                            if (!text || text.trim() === '') {
                                text = '💬 Message';
                            }
                            
                            const isOutgoing = msg.senderId === this.currentUser.uid;
                            const div = document.createElement('div');
                            div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
                            div.id = `msg-${doc.id}`;
                            
                            // Ник для групп и каналов
                            let senderHtml = '';
                            if (!isOutgoing && this.currentChatType !== 'private') {
                                this.getUserData(msg.senderId).then(userData => {
                                    const senderSpan = document.getElementById(`sender-${doc.id}`);
                                    if (senderSpan && userData) {
                                        senderSpan.textContent = userData.username;
                                        if (userData.usernameColor) {
                                            senderSpan.style.color = this.getColorCode(userData.usernameColor);
                                        }
                                    }
                                });
                                senderHtml = `<span class="message-sender" id="sender-${doc.id}">...</span>`;
                            }
                            
                            div.innerHTML = `
                                ${senderHtml}
                                <div class="message-text">${text}</div>
                                <div class="message-time">
                                    ${msg.timestamp ? this.formatTime(msg.timestamp.toDate()) : ''}
                                </div>
                            `;
                            
                            container.appendChild(div);
                        });
                        
                        container.scrollTop = container.scrollHeight;
                    });
            }

            getColorCode(color) {

                    red: '#EF4444',
                    green: '#10B981',
                    purple: '#8B5CF6',
                    gold: '#F59E0B',
                    pink: '#EC4899'

            async searchAllUsers(query) {
                if (!query.trim()) {
                    document.getElementById('search-sidebar')?.classList.remove('active');

            <!-- ========== 2.10 ОТПРАВКА СООБЩЕНИЙ ========== -->
            async sendMessage() {
                const input = document.getElementById('message-input');
                const text = input.value.trim();
                if (!text || !this.currentChatId) return;
                
                // Для каналов проверяем права
                if (this.currentChatType === 'channel' && this.currentChatData) {
                    const isAdmin = this.currentChatData.admins?.includes(this.currentUser.uid);
                    const isRestricted = this.currentChatData.restricted === true;
                    if (isRestricted && !isAdmin) {
                        alert('Only admins can post in this channel');
                        return;
                    }
                }
                
                try {
                    const encrypted = hypebitCrypto.encryptMessage(text, this.currentChatId, this.currentUser.uid);
                    
                    await db.collection('chats').doc(this.currentChatId)
                        .collection('messages').add({
                            text: encrypted,
                            encrypted: true,
                            senderId: this.currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    
                    await db.collection('chats').doc(this.currentChatId).update({
                        lastMessage: { text: text.substring(0,30), senderId: this.currentUser.uid },
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    const newCount = (this.userMessages || 0) + 1;
                    const oldPoints = this.userPoints || 0;
                    const newPoints = Math.floor(newCount / 120);
                    
                    if (newPoints > oldPoints) {
                        this.userPoints = newPoints;
                        document.getElementById('points-count').textContent = newPoints;
                        document.getElementById('shop-points').textContent = newPoints;
                        
                        await db.collection('users').doc(this.currentUser.uid).update({
                            messagesCount: newCount,
                            points: newPoints
                        });
                    } else {
                        await db.collection('users').doc(this.currentUser.uid).update({
                            messagesCount: newCount
                        });
                    }
                    
                    this.userMessages = newCount;
                    
                    input.value = '';
                    document.getElementById('send-btn').disabled = true;
                    
                    await db.collection('chats').doc(this.currentChatId).update({
                        'typing': firebase.firestore.FieldValue.arrayRemove(this.currentUser.uid)
                    });
                    
                } catch (error) {
                    console.error('Send error:', error);
                    alert('Failed to send');
                }
            }

            async handleTyping() {
                if (!this.currentChatId || this.currentChatType === 'channel') return;
                if (this.typingTimeout) clearTimeout(this.typingTimeout);
                
                await db.collection('chats').doc(this.currentChatId).update({
                    typing: firebase.firestore.FieldValue.arrayUnion(this.currentUser.uid)
                });
                
                this.typingTimeout = setTimeout(async () => {
                    await db.collection('chats').doc(this.currentChatId).update({
                        typing: firebase.firestore.FieldValue.arrayRemove(this.currentUser.uid)
                    });
                }, 2000);
            }

            <!-- ========== 2.11 ЗАГРУЗКА ФАЙЛОВ ========== -->
            async uploadFile(file) {
                if (!this.currentChatId) return;
                
                // Для каналов проверяем права
                if (this.currentChatType === 'channel' && this.currentChatData) {
                    const isAdmin = this.currentChatData.admins?.includes(this.currentUser.uid);
                    const isRestricted = this.currentChatData.restricted === true;
                    if (isRestricted && !isAdmin) {
                        alert('Only admins can upload files in this channel');
                        return;
                    }
                }
                
                if (file.size > 10 * 1024 * 1024) {
                    alert('File too large (max 10MB)');
                    return;
                }
                
                try {
                    this.showNotification('Uploading file...', 'info');
                    
                    const fileRef = storage.ref(`chats/${this.currentChatId}/${Date.now()}_${file.name}`);
                    await fileRef.put(file);
                    const fileUrl = await fileRef.getDownloadURL();
                    
                    await db.collection('chats').doc(this.currentChatId)
                        .collection('messages').add({
                            fileUrl: fileUrl,
                            fileName: file.name,
                            fileSize: file.size,
                            fileType: file.type,
                            senderId: this.currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    
                    await db.collection('chats').doc(this.currentChatId).update({
                        lastMessage: { text: '📎 ' + file.name.substring(0,20), senderId: this.currentUser.uid },
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    this.showNotification('File uploaded!', 'success');
                    
                } catch (error) {
                    console.error('File upload error:', error);
                    alert('Failed to upload file');
                }
            }

            formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            showNotification(message, type = 'info') {
                if (window.HypebitUtils) {
                    window.HypebitUtils.showNotification(message, type);
                } else {
                    console.log(message);
                }
            }

            <!-- ========== 2.12 РЕАКЦИИ ========== -->
            async addReaction(messageId, emoji) {
                if (!this.currentChatId) return;

                try {
                    const messageRef = db.collection('chats').doc(this.currentChatId)
                        .collection('messages').doc(messageId);
                    
                    await db.runTransaction(async (transaction) => {
                        const messageDoc = await transaction.get(messageRef);
                        if (!messageDoc.exists) return;
                        
                        const message = messageDoc.data();
                        const reactions = message.reactions || {};
                        
                        if (reactions[this.currentUser.uid] === emoji) {
                            delete reactions[this.currentUser.uid];
                        } else {
                            reactions[this.currentUser.uid] = emoji;
                        }
                        
                        transaction.update(messageRef, { reactions });
                    });
                } catch (error) {
                    console.error('Error adding reaction:', error);
                }
            }

            async editMessage(messageId) {
                const newText = prompt('Edit message:');
                if (!newText) return;
                
                const encrypted = hypebitCrypto.encryptMessage(newText, this.currentChatId, this.currentUser.uid);
                await db.collection('chats').doc(this.currentChatId)
                    .collection('messages').doc(messageId)
                    .update({ text: encrypted, edited: true });
            }

            async deleteMessage(messageId) {
                if (!confirm('Delete this message?')) return;
                await db.collection('chats').doc(this.currentChatId)
                    .collection('messages').doc(messageId).delete();
            }

            <!-- ========== 2.13 ПРОФИЛЬ ========== -->

                document.getElementById('profile-status').value = this.userData.status || 'online';
                
                document.getElementById('profile-avatar-large').innerHTML = `

                const username = document.getElementById('profile-username').value;
                const bio = document.getElementById('profile-bio').value;
                const status = document.getElementById('profile-status').value;
                
                if (!username) {
                    alert('Username cannot be empty');

                try {
                    await db.collection('users').doc(this.currentUser.uid).update({
                        username: username,
                        bio: bio,

                    });
                    
                    document.getElementById('username').textContent = username;
                    this.userData.username = username;
                    alert('Profile updated!');

            updateUsernameColor(color) {
                document.getElementById('username').className = `username username-color-${color}`;
                db.collection('users').doc(this.currentUser.uid).update({ usernameColor: color });
            }

            applyTheme(theme) {
                document.body.className = `theme-${theme}`;
                db.collection('users').doc(this.currentUser.uid).update({ theme: theme });
                document.querySelectorAll('.theme-option').forEach(opt => {
                    opt.classList.toggle('selected', opt.dataset.theme === theme);
                });

            <!-- ========== 2.14 МАГАЗИН ========== -->
            async openShop() {
                document.getElementById('shop-points').textContent = this.userPoints;
                
                const shopItems = [
                    { id: 'color', name: 'Color Name', desc: 'Change username color', price: 10, icon: '🎨' },
                    { id: 'reactions', name: 'Premium Reactions', desc: 'Unlock 👑 🦄 🚀', price: 15, icon: '👑' },
                    { id: 'theme', name: 'Custom Themes', desc: 'Forest, Space, Light', price: 20, icon: '🌈' }
                ];
                
                let html = '';
                shopItems.forEach(item => {
                    const purchased = this.purchasedItems.has(item.id);
                    html += `
                        <div class="shop-item ${purchased ? 'purchased' : ''}">
                            <div class="shop-item-icon">${item.icon}</div>
                            <div class="shop-item-info">
                                <div class="shop-item-title">${item.name}</div>
                                <div class="shop-item-desc">${item.desc}</div>
                            </div>
                            <div class="shop-item-price">${item.price} ⭐</div>
                            <button class="shop-item-btn ${purchased ? 'purchased' : ''}" 
                                    onclick="app.buyItem('${item.id}', ${item.price})"
                                    ${purchased ? 'disabled' : ''}>
                                ${purchased ? 'Owned' : 'Buy'}
                            </button>
                        </div>
                    `;
                });
                
                document.getElementById('shop-items').innerHTML = html;
                document.getElementById('shop-modal').classList.add('active');
            }

            async buyItem(itemId, price) {
                if (this.userPoints < price) {
                    alert('Not enough points!');
                    return;
                }
                
                if (this.purchasedItems.has(itemId)) {
                    alert('You already own this item!');
                    return;
                }
                
                try {
                    const newPoints = this.userPoints - price;
                    
                    await db.collection('users').doc(this.currentUser.uid).update({
                        points: newPoints,
                        purchasedItems: firebase.firestore.FieldValue.arrayUnion(itemId)
                    });
                    
                    this.userPoints = newPoints;
                    this.purchasedItems.add(itemId);
                    
                    document.getElementById('points-count').textContent = newPoints;
                    document.getElementById('shop-points').textContent = newPoints;
                    
                    if (event?.target) {
                        event.target.textContent = 'Owned';
                        event.target.disabled = true;
                        event.target.classList.add('purchased');
                    } else {
                        this.openShop();
                    }
                    
                    alert('Purchase successful!');
                    
                } catch (error) {
                    console.error('Purchase error:', error);
                    alert('Purchase failed');
                }
            }

            <!-- ========== 2.15 СОЗДАНИЕ ЧАТОВ (С ИСПРАВЛЕННЫМИ ГАЛОЧКАМИ) ========== -->
            openModal(modalId) {
                document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                document.getElementById(modalId)?.classList.add('active');
                this.selectedUsers = [];
            }

            async searchUsers(query, listId, multi = false) {
                if (!query.trim()) {
                    document.getElementById(listId).innerHTML = '';
                    return;
                }
                
                try {
                    const snapshot = await db.collection('users')
                        .where('username', '>=', query)
                        .where('username', '<=', query + '\uf8ff')
                        .limit(20)
                        .get();
                    
                    if (snapshot.empty) {
                        document.getElementById(listId).innerHTML = '<div style="color: #9CA3AF; padding: 20px;">No users found</div>';
                        return;
                    }
                    
                    let html = '';
                    snapshot.forEach(doc => {
                        if (doc.id !== this.currentUser.uid) {
                            const user = doc.data();
                            const isSelected = this.selectedUsers.includes(doc.id);
                            
                            html += `
                                <div class="user-item" onclick="${multi ? `app.toggleUser('${doc.id}')` : `app.createPrivateChat('${doc.id}')`}">
                                    <div class="user-item-avatar"><div>${user.username.charAt(0).toUpperCase()}</div></div>
                                    <div class="user-item-name">${user.username}</div>
                                    ${multi ? `<input type="checkbox" class="user-check" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); app.toggleUser('${doc.id}')">` : ''}
                                </div>
                            `;
                        }
                    });
                    
                    document.getElementById(listId).innerHTML = html;
                    
                } catch (error) {
                    console.error('Search users error:', error);
                }
            }

            toggleUser(userId) {
                const idx = this.selectedUsers.indexOf(userId);
                if (idx === -1) this.selectedUsers.push(userId);
                else this.selectedUsers.splice(idx, 1);
                
                const checkbox = event?.target?.closest('.user-item')?.querySelector('.user-check');
                if (checkbox) checkbox.checked = !checkbox.checked;
            }

            async createPrivateChat(userId) {
                try {
                    const existingChats = await db.collection('chats')
                        .where('participants', 'array-contains', this.currentUser.uid)
                        .get();
                    
                    let existingChat = null;
                    existingChats.forEach(doc => {
                        const chat = doc.data();
                        if (chat.participants.includes(userId) && chat.type === 'private') existingChat = doc.id;
                    });
                    
                    if (existingChat) {
                        this.selectChat(existingChat, 'private');
                        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                        document.getElementById('search-sidebar')?.classList.remove('active');
                        return;
                    }
                    
                    const chatRef = await db.collection('chats').add({
                        participants: [this.currentUser.uid, userId],
                        type: 'private',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    this.selectChat(chatRef.id, 'private');
                    document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                    document.getElementById('search-sidebar')?.classList.remove('active');
                    
                } catch (error) {
                    console.error('Create chat error:', error);
                    alert('Failed to create chat');
                }
            }

                    alert('Group name and at least one member required');
                    return;

                try {
                    const members = [this.currentUser.uid, ...this.selectedUsers];
                    const chatRef = await db.collection('chats').add({
                        name, 
                        members, 
                        admins: [this.currentUser.uid], 
                        participants: members,
                        description: document.getElementById('group-description')?.value,
                        type: 'group',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    this.selectChat(chatRef.id, 'group');
                    document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                    this.selectedUsers = [];
                    
                } catch (error) {
                    console.error('Create group error:', error);
                    alert('Failed to create group');
                }
            }

                const name = document.getElementById('channel-name')?.value;
                if (!name) {
                    alert('Channel name required');
                    return;
                }
                
                try {

                        description: document.getElementById('channel-description')?.value || '',
                        type: 'channel',
                        admins: [this.currentUser.uid],
                        subscribers: [this.currentUser.uid],

                        restricted: isRestricted,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),

                    this.selectChat(chatRef.id, 'channel');

                        ${isAdmin ? '<p style="color:#F59E0B; margin-top:10px;">👑 You are an admin</p>' : ''}
                        ${!this.currentChatData.subscribers?.includes(this.currentUser.uid) ? `
                            <button class="auth-btn" style="margin-top:20px;" onclick="app.joinChannel()">Join Channel</button>
                        ` : ''}
                    `;
                }
                
                modal.classList.add('active');
            }

            async joinChannel() {
                if (!this.currentChatId || this.currentChatType !== 'channel') return;
                
                // Проверяем, приватный ли канал
                if (this.currentChatData?.private) {
                    alert('This is a private channel. Only invited users can join.');
                    return;
                }
                
                try {
                    await db.collection('chats').doc(this.currentChatId).update({
                        subscribers: firebase.firestore.FieldValue.arrayUnion(this.currentUser.uid),
                        participants: firebase.firestore.FieldValue.arrayUnion(this.currentUser.uid)
                    });
                    document.getElementById('chat-info-modal')?.classList.remove('active');
                    alert('You joined the channel!');
                } catch (error) {
                    console.error('Error joining channel:', error);
                    alert('Failed to join channel');
                }
            }

            getErrorMessage(errorCode) {
                const errors = {
                    'auth/email-already-in-use': 'Email already registered!',
                    'auth/invalid-email': 'Invalid email!',
                    'auth/user-not-found': 'User not found!',
                    'auth/wrong-password': 'Wrong password!',
                    'auth/weak-password': 'Password too weak!',
                    'auth/network-request-failed': 'Network error!',
                    'auth/too-many-requests': 'Too many attempts!'
                };
                return errors[errorCode] || 'An error occurred!';
            }
        }

        // ========== ЗАПУСК ==========
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new HypebitApp();
        });
    </script>
